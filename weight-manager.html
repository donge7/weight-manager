<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f8ef7" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="체중관리" />
  <title>체중관리</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.svg" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── 라이트 모드 ── */
    :root {
      --bg: #f4f6f9;
      --card: #ffffff;
      --primary: #4f8ef7;
      --primary-dark: #3a74e0;
      --danger: #ef4444;
      --text: #1e293b;
      --sub: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    /* ── 다크 모드 ── */
    body.dark {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --sub: #94a3b8;
      --border: #334155;
      --shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    html, body { width: 100%; overflow-x: hidden; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
      transition: background 0.25s, color 0.25s;
    }

    /* ── 로딩 오버레이 ── */
    #loadingOverlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 9999; transition: opacity 0.3s;
    }
    #loadingOverlay .spinner {
      width: 40px; height: 40px;
      border: 4px solid var(--border); border-top-color: var(--primary);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    #loadingOverlay p { color: var(--sub); font-size: 0.9rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 헤더 ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--primary);
    }

    .dark-toggle {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      line-height: 1;
    }

    .dark-toggle:hover { border-color: var(--primary); }

    /* ── 그리드 ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      max-width: 900px;
      margin: 0 auto;
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ── 카드 ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      transition: background 0.25s, box-shadow 0.25s;
    }

    .card.full { grid-column: 1 / -1; }

    .card h2 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 14px;
    }

    /* ── 폼 ── */
    label {
      display: block;
      font-size: 0.85rem;
      color: var(--sub);
      margin-bottom: 4px;
      margin-top: 10px;
    }

    label:first-of-type { margin-top: 0; }

    input[type="date"],
    input[type="number"],
    input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s, background 0.25s, color 0.25s;
    }

    input:focus { border-color: var(--primary); }

    /* ── 버튼 ── */
    .btn {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary  { background: var(--primary); color: #fff; }
    .btn-primary:hover  { background: var(--primary-dark); }
    .btn-danger   { background: var(--danger); color: #fff; margin-top: 8px; }
    .btn-danger:hover   { background: #dc2626; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover { filter: brightness(0.92); }
    .btn-violet { background: #6366f1; color: #fff; }
    .btn-violet:hover { background: #4f46e5; }

    /* ── 통계 ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stat-box {
      text-align: center;
      background: var(--bg);
      border-radius: 8px;
      padding: 12px 6px;
      transition: background 0.25s;
    }

    .stat-box .val {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary);
    }

    .stat-box .lbl {
      font-size: 0.75rem;
      color: var(--sub);
      margin-top: 2px;
    }

    /* ── 그래프 ── */
    .chart-wrap { position: relative; height: 220px; }

    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 5px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.82rem;
      cursor: pointer;
      background: var(--card);
      color: var(--sub);
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    /* ── 목표 바 ── */
    .goal-bar-wrap { margin-top: 12px; }
    .goal-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--sub); margin-bottom: 6px; }
    .goal-bar { height: 10px; background: var(--bg); border-radius: 99px; overflow: hidden; border: 1px solid var(--border); }
    .goal-fill { height: 100%; background: var(--primary); border-radius: 99px; transition: width 0.5s; }
    .no-data { color: var(--sub); font-size: 0.85rem; margin-top: 8px; }

    /* ── 테이블 ── */
    #tableWrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; min-width: 260px; }
    th { text-align: left; padding: 8px 10px; color: var(--sub); font-weight: 600; border-bottom: 2px solid var(--border); }
    td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }

    .data-row.has-memo { cursor: pointer; }
    .data-row.has-memo td:first-child::after {
      content: ' 💬';
      font-size: 0.75rem;
      opacity: 0.5;
    }
    .data-row:hover td { background: var(--bg); }

    .memo-row td {
      background: var(--bg);
      color: var(--sub);
      font-size: 0.82rem;
      padding: 6px 14px 10px;
      border-bottom: 1px solid var(--border);
    }

    .change-up   { color: #ef4444; font-weight: 600; }
    .change-down { color: #22c55e; font-weight: 600; }
    .change-eq   { color: var(--sub); }

    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e1;
      font-size: 1rem;
      transition: color 0.15s;
      padding: 2px 6px;
    }
    .del-btn:hover { color: var(--danger); }

    .empty { text-align: center; color: var(--sub); padding: 30px 0; font-size: 0.9rem; }

    /* ── 감량 속도 ── */
    .pace-box { margin-top: 12px; background: var(--bg); border-radius: 8px; padding: 12px; transition: background 0.25s; }
    .pace-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.83rem; margin-bottom: 6px; }
    .pace-row:last-child { margin-bottom: 0; }
    .pace-label { color: var(--sub); }
    .pace-value { font-weight: 600; }

    /* ── 요일별 평균 ── */
    .dow-grid { display: flex; gap: 6px; align-items: flex-end; height: 130px; margin-top: 4px; }
    .dow-box { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .dow-label { font-size: 0.78rem; font-weight: 700; color: var(--sub); }
    .dow-bar-wrap { flex: 1; width: 100%; display: flex; align-items: flex-end; justify-content: center; }
    .dow-bar { width: 65%; background: var(--primary); border-radius: 4px 4px 0 0; min-height: 3px; opacity: 0.65; transition: height 0.4s; }
    .dow-box.today .dow-bar { opacity: 1; background: #22c55e; }
    .dow-box.today .dow-label { color: #22c55e; }
    .dow-val { font-size: 0.72rem; font-weight: 600; color: var(--text); }
    .dow-count { font-size: 0.68rem; color: var(--sub); }

    /* ── 아코디언 ── */
    .accordion { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }

    .acc-year-hd, .acc-month-hd {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .acc-year-hd {
      background: var(--bg);
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--primary);
      border-bottom: 1px solid var(--border);
    }
    .acc-year-hd:hover { filter: brightness(0.96); }

    .acc-month-hd {
      background: var(--card);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      padding-left: 22px;
    }
    .acc-month-hd:hover { background: var(--bg); }

    .acc-meta { margin-left: auto; font-size: 0.78rem; color: var(--sub); font-weight: 400; }
    .acc-arrow { font-size: 0.7rem; color: var(--sub); margin-left: 4px; }

    .acc-month-body table { min-width: unset; }
    .acc-month-body td, .acc-month-body th { padding: 7px 10px 7px 22px; }

    /* ── 백업 ── */
    .backup-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .backup-row .btn { margin-top: 0; flex: 1; min-width: 120px; }
    .restore-info { font-size: 0.8rem; color: var(--sub); margin-top: 8px; }
    #fileInput { display: none; }

    /* ── DB 정보 ── */
    .db-info { background: var(--bg); border-radius: 8px; padding: 10px 14px; margin-top: 14px; font-size: 0.82rem; color: var(--sub); }
    .db-info span { color: var(--primary); font-weight: 600; }

    /* ── 백업 알림 배너 ── */
    .bk-banner {
      max-width: 900px; margin: 0 auto 16px;
      border-radius: 10px; padding: 13px 16px;
      display: flex; align-items: center; gap: 12px;
      font-size: 0.87rem; animation: slideDown 0.25s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .bk-banner.warn {
      background: #fef3c7; border: 1px solid #f59e0b; color: #92400e;
    }
    .bk-banner.danger {
      background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b;
    }
    .bk-banner.ok {
      background: #f0fdf4; border: 1px solid #86efac; color: #166534;
    }
    body.dark .bk-banner.warn   { background: #451a03; border-color: #b45309; color: #fcd34d; }
    body.dark .bk-banner.danger { background: #450a0a; border-color: #b91c1c; color: #fca5a5; }
    body.dark .bk-banner.ok     { background: #052e16; border-color: #16a34a; color: #86efac; }
    .bk-banner .bk-icon  { font-size: 1.3rem; flex-shrink: 0; }
    .bk-banner .bk-text  { flex: 1; line-height: 1.5; }
    .bk-banner .bk-text strong { display: block; margin-bottom: 2px; }
    .bk-banner .bk-btn {
      padding: 6px 14px; border: none; border-radius: 6px;
      font-size: 0.82rem; font-weight: 600; cursor: pointer; white-space: nowrap;
      background: #f59e0b; color: #fff;
    }
    .bk-banner.danger .bk-btn { background: #ef4444; }
    .bk-banner.ok     .bk-btn { background: #22c55e; }
    .bk-banner .bk-close {
      background: none; border: none; cursor: pointer;
      font-size: 1rem; opacity: 0.5; padding: 4px; flex-shrink: 0;
    }
    .bk-banner .bk-close:hover { opacity: 1; }

    /* ── 마지막 백업 상태 ── */
    .last-backup-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg); border-radius: 8px; padding: 10px 14px;
      margin-top: 14px; font-size: 0.82rem;
    }
    .last-backup-row .lb-label { color: var(--sub); }
    .last-backup-row .lb-val   { font-weight: 600; }
  </style>
</head>
<body>

<!-- 백업 알림 배너 -->
<div id="backupBanner"></div>

<!-- 로딩 오버레이 -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <p>SQLite 데이터베이스 초기화 중...</p>
</div>

<div class="header">
  <h1>⚖️ 체중관리</h1>
  <button class="dark-toggle" onclick="toggleDark()" id="darkBtn" style="position:absolute;right:0">🌙</button>
</div>

<div class="grid">

  <!-- 1. 기록 입력 -->
  <div class="card">
    <h2>기록 입력</h2>
    <label>날짜</label>
    <input type="date" id="inputDate" />
    <label>체중 (kg)</label>
    <input type="number" id="inputWeight" step="0.1" min="20" max="300" placeholder="0.0" />
    <label>메모 (선택)</label>
    <input type="text" id="inputMemo" placeholder="예: 운동함, 과식" maxlength="30" />
    <button class="btn btn-primary" onclick="addRecord()">기록 저장</button>
  </div>

  <!-- 2. 통계 -->
  <div class="card">
    <h2>통계</h2>
    <div class="stats-row">
      <div class="stat-box">
        <div class="val" id="statCurrent">—</div>
        <div class="lbl">현재 체중</div>
      </div>
      <div class="stat-box">
        <div class="val" id="statWeekAvg">—</div>
        <div class="lbl">7일 평균</div>
      </div>
      <div class="stat-box">
        <div class="val" id="statMonthAvg">—</div>
        <div class="lbl">30일 평균</div>
      </div>
    </div>
    <div class="stats-row" style="margin-top:10px">
      <div class="stat-box">
        <div class="val" id="statMin">—</div>
        <div class="lbl">최저</div>
      </div>
      <div class="stat-box">
        <div class="val" id="statMax">—</div>
        <div class="lbl">최고</div>
      </div>
      <div class="stat-box">
        <div class="val" id="statTotal">—</div>
        <div class="lbl">총 변화</div>
      </div>
    </div>
    <div class="stats-row" style="margin-top:10px">
      <div class="stat-box">
        <div class="val" id="statStreak">—</div>
        <div class="lbl">현재 연속</div>
      </div>
      <div class="stat-box">
        <div class="val" id="statBestStreak">—</div>
        <div class="lbl">최장 연속</div>
      </div>
      <div class="stat-box">
        <div class="val" id="statCount">—</div>
        <div class="lbl">총 기록일</div>
      </div>
    </div>
  </div>

  <!-- 3. 체중 추이 -->
  <div class="card full">
    <h2>체중 추이</h2>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setRange(7, this)">7일</button>
      <button class="filter-btn" onclick="setRange(30, this)">30일</button>
      <button class="filter-btn" onclick="setRange(90, this)">90일</button>
      <button class="filter-btn" onclick="setRange(0, this)">전체</button>
    </div>
    <div class="chart-wrap">
      <canvas id="weightChart"></canvas>
    </div>
  </div>

  <!-- 3.5 요일별 평균 -->
  <div class="card full">
    <h2>요일별 평균</h2>
    <div class="dow-grid" id="weekdayStats"></div>
  </div>

  <!-- 4. 목표 설정 -->
  <div class="card">
    <h2>목표 설정</h2>
    <label>시작 체중 (kg)</label>
    <input type="number" id="goalStart" step="0.1" placeholder="예: 75.0" />
    <label>목표 체중 (kg)</label>
    <input type="number" id="goalTarget" step="0.1" placeholder="예: 65.0" />
    <button class="btn btn-primary" onclick="saveGoal()">목표 저장</button>
    <div class="goal-bar-wrap" id="goalSection" style="display:none">
      <div class="goal-label">
        <span id="goalStartLbl"></span>
        <span id="goalPct"></span>
        <span id="goalTargetLbl"></span>
      </div>
      <div class="goal-bar"><div class="goal-fill" id="goalFill"></div></div>
      <p class="no-data" id="goalMsg"></p>
    </div>
    <div id="paceSection"></div>
  </div>

  <!-- 5. BMI -->
  <div class="card">
    <h2>BMI 계산기</h2>
    <label>키 (cm)</label>
    <input type="number" id="bmiHeight" step="0.1" placeholder="예: 170" />
    <button class="btn btn-primary" onclick="calcBMI()">BMI 계산</button>
    <div id="bmiResult" style="margin-top:12px; font-size:0.9rem; color:var(--sub);"></div>
  </div>

  <!-- 6. 기록 목록 -->
  <div class="card full">
    <h2>기록 목록</h2>
    <div id="tableWrap"></div>
    <button class="btn btn-danger" onclick="clearAll()" style="max-width:200px">전체 삭제</button>
  </div>

  <!-- 7. 백업/복원 -->
  <div class="card full">
    <h2 style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:0" onclick="toggleBackupCard()">
      <span>백업 / 복원</span>
      <span id="backupArrow" style="font-size:0.75rem;color:var(--sub);font-weight:400">▼</span>
    </h2>
    <div id="backupBody" style="display:none">
      <p class="restore-info" style="margin-top:14px">모든 기록·목표·키 데이터를 내보내거나 불러올 수 있습니다.<br>⚠️ 브라우저 <strong>사이트 데이터 삭제</strong> 시 앱 데이터도 함께 삭제됩니다. 정기 백업을 권장합니다.</p>
      <div class="last-backup-row" id="lastBackupRow">
        <span class="lb-label">마지막 백업</span>
        <span class="lb-val" id="lastBackupVal">—</span>
      </div>
      <div class="backup-row">
        <button class="btn btn-primary" onclick="exportJSON()">JSON 백업</button>
        <button class="btn btn-violet" onclick="exportSQLite()">SQLite .db 저장</button>
        <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">백업 불러오기 (JSON)</button>
      </div>
      <input type="file" id="fileInput" accept=".json" onchange="importBackup(event)" />
      <p class="restore-info" id="restoreMsg"></p>
      <div class="db-info" id="dbInfo"></div>
    </div>
  </div>

</div>

<script>
  // ── 상수 ────────────────────────────────────────────────
  const KEY_DARK        = 'wm_dark';
  const DB_STORE        = 'wm_sqlitedb';
  const KEY_LAST_BACKUP = 'wm_last_backup';
  const BACKUP_WARN_DAYS   = 7;   // 7일 경과 → 주의
  const BACKUP_DANGER_DAYS = 14;  // 14일 경과 → 위험

  let db = null;

  // ── SQLite 초기화 ────────────────────────────────────────
  async function initDB() {
    const SQL = await initSqlJs({
      locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}`
    });

    const saved = localStorage.getItem(DB_STORE);
    if (saved) {
      try {
        const bin = atob(saved);
        const arr = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
        db = new SQL.Database(arr);
      } catch {
        db = new SQL.Database();
      }
    } else {
      db = new SQL.Database();
    }

    db.run(`
      CREATE TABLE IF NOT EXISTS records (
        date   TEXT PRIMARY KEY,
        weight REAL NOT NULL,
        memo   TEXT DEFAULT ''
      );
      CREATE TABLE IF NOT EXISTS settings (
        key   TEXT PRIMARY KEY,
        value TEXT
      );
    `);

    migrateOldData();
  }

  // localStorage → SQLite 마이그레이션 (구버전 데이터 자동 이전)
  function migrateOldData() {
    let migrated = false;
    const oldRecords = localStorage.getItem('wm_records');
    const oldGoal    = localStorage.getItem('wm_goal');
    const oldHeight  = localStorage.getItem('wm_height');

    if (oldRecords) {
      try {
        JSON.parse(oldRecords).forEach(r => {
          db.run(
            'INSERT OR IGNORE INTO records (date, weight, memo) VALUES (?, ?, ?)',
            [r.date, r.weight, r.memo || '']
          );
        });
      } catch {}
      localStorage.removeItem('wm_records');
      migrated = true;
    }
    if (oldGoal) {
      db.run('INSERT OR REPLACE INTO settings (key, value) VALUES (?, ?)', ['goal', oldGoal]);
      localStorage.removeItem('wm_goal');
      migrated = true;
    }
    if (oldHeight) {
      db.run('INSERT OR REPLACE INTO settings (key, value) VALUES (?, ?)', ['height', oldHeight]);
      localStorage.removeItem('wm_height');
      migrated = true;
    }
    if (migrated) {
      saveDB();
      console.log('[마이그레이션] 기존 localStorage 데이터를 SQLite로 이전 완료');
    }
  }

  // SQLite DB → base64 → localStorage 저장
  function saveDB() {
    const data = db.export();
    let binary = '';
    for (let i = 0; i < data.length; i += 8192) {
      binary += String.fromCharCode(...data.subarray(i, Math.min(i + 8192, data.length)));
    }
    localStorage.setItem(DB_STORE, btoa(binary));
    updateDBInfo();
  }

  // ── 데이터 접근 함수 ─────────────────────────────────────
  function getRecords() {
    const res = db.exec('SELECT date, weight, memo FROM records ORDER BY date');
    if (!res.length) return [];
    return res[0].values.map(([date, weight, memo]) => ({
      date, weight, memo: memo || ''
    }));
  }

  function dbGet(key) {
    const stmt = db.prepare('SELECT value FROM settings WHERE key = ?');
    stmt.bind([key]);
    let val = null;
    if (stmt.step()) {
      try { val = JSON.parse(stmt.getAsObject().value); }
      catch { val = stmt.getAsObject().value; }
    }
    stmt.free();
    return val;
  }

  function dbSet(key, val) {
    db.run('INSERT OR REPLACE INTO settings (key, value) VALUES (?, ?)', [key, JSON.stringify(val)]);
    saveDB();
  }

  // ── DB 정보 표시 ─────────────────────────────────────────
  function updateDBInfo() {
    const el = document.getElementById('dbInfo');
    if (!el || !db) return;
    const countRes = db.exec('SELECT COUNT(*) FROM records');
    const count = countRes.length ? countRes[0].values[0][0] : 0;
    const raw = localStorage.getItem(DB_STORE) || '';
    const kb  = (raw.length * 0.75 / 1024).toFixed(1);
    el.innerHTML = `🗄️ SQLite 저장소 — 기록 <span>${count}건</span> · DB 크기 <span>~${kb} KB</span>`;
  }

  // ── 백업 알림 시스템 ─────────────────────────────────────
  function getLastBackupDays() {
    const last = localStorage.getItem(KEY_LAST_BACKUP);
    if (!last) return null; // 한 번도 백업 안 함
    return Math.floor((Date.now() - new Date(last).getTime()) / 86400000);
  }

  function updateLastBackupUI() {
    const last = localStorage.getItem(KEY_LAST_BACKUP);
    const el   = document.getElementById('lastBackupVal');
    if (!el) return;
    if (!last) {
      el.textContent = '없음';
      el.style.color = '#ef4444';
      return;
    }
    const days = Math.floor((Date.now() - new Date(last).getTime()) / 86400000);
    const label = days === 0 ? '오늘' : days === 1 ? '어제' : `${days}일 전`;
    el.textContent = `${last} (${label})`;
    el.style.color = days < BACKUP_WARN_DAYS ? '#22c55e'
                   : days < BACKUP_DANGER_DAYS ? '#f59e0b' : '#ef4444';
  }

  function checkBackupReminder() {
    const days    = getLastBackupDays();
    const banner  = document.getElementById('backupBanner');
    const records = getRecords();
    if (!banner || records.length === 0) return; // 기록이 없으면 알림 불필요

    let type = '', icon = '', title = '', desc = '';

    if (days === null) {
      type  = 'warn';
      icon  = '💾';
      title = '아직 백업을 하지 않았습니다';
      desc  = '사이트 데이터를 지우면 모든 기록이 삭제됩니다. 지금 바로 백업하세요.';
    } else if (days >= BACKUP_DANGER_DAYS) {
      type  = 'danger';
      icon  = '🚨';
      title = `마지막 백업으로부터 ${days}일이 지났습니다`;
      desc  = '데이터 유실 위험이 높습니다. 지금 즉시 백업해 주세요.';
    } else if (days >= BACKUP_WARN_DAYS) {
      type  = 'warn';
      icon  = '⚠️';
      title = `마지막 백업으로부터 ${days}일이 지났습니다`;
      desc  = '주기적인 백업으로 데이터를 안전하게 보관하세요.';
    } else {
      return; // 7일 이내 → 배너 없음
    }

    banner.innerHTML = `
      <div class="bk-banner ${type}">
        <span class="bk-icon">${icon}</span>
        <span class="bk-text">
          <strong>${title}</strong>${desc}
        </span>
        <button class="bk-btn" onclick="exportJSON(); dismissBanner()">지금 백업</button>
        <button class="bk-close" onclick="dismissBanner()" title="닫기">✕</button>
      </div>`;
  }

  function dismissBanner() {
    const banner = document.getElementById('backupBanner');
    if (banner) banner.innerHTML = '';
  }

  function markBackupDone() {
    const todayStr = new Date().toISOString().slice(0, 10);
    localStorage.setItem(KEY_LAST_BACKUP, todayStr);
    updateLastBackupUI();
    // 백업 완료 후 배너를 초록색 완료 메시지로 교체
    const banner = document.getElementById('backupBanner');
    if (banner) {
      banner.innerHTML = `
        <div class="bk-banner ok">
          <span class="bk-icon">✅</span>
          <span class="bk-text"><strong>백업 완료!</strong>${todayStr} 백업 파일이 다운로드됐습니다. Downloads 폴더를 확인하세요.</span>
          <button class="bk-close" onclick="dismissBanner()" title="닫기">✕</button>
        </div>`;
      setTimeout(dismissBanner, 5000); // 5초 후 자동 닫기
    }
  }

  // ── 다크모드 ─────────────────────────────────────────────
  function toggleDark() {
    const isDark = document.body.classList.toggle('dark');
    document.getElementById('darkBtn').textContent = isDark ? '☀️' : '🌙';
    localStorage.setItem(KEY_DARK, JSON.stringify(isDark));
    updateChart(getRecords());
  }

  function initDark() {
    try {
      const isDark = JSON.parse(localStorage.getItem(KEY_DARK));
      if (isDark) {
        document.body.classList.add('dark');
        document.getElementById('darkBtn').textContent = '☀️';
      }
    } catch {}
  }

  // ── Init ─────────────────────────────────────────────────
  let chartRange  = 7;
  let weightChart = null;

  document.addEventListener('DOMContentLoaded', async () => {
    initDark();
    document.getElementById('inputDate').value = today();

    try {
      await initDB();
    } catch (err) {
      console.error('SQLite 초기화 실패:', err);
      alert('데이터베이스 초기화에 실패했습니다.\n인터넷 연결을 확인해 주세요.');
    }

    // 로딩 오버레이 제거
    const overlay = document.getElementById('loadingOverlay');
    overlay.style.opacity = '0';
    setTimeout(() => overlay.remove(), 300);

    loadGoalUI();
    loadHeightUI();
    updateDBInfo();
    updateLastBackupUI();
    render();

  });

  function today() {
    return new Date().toISOString().slice(0, 10);
  }

  // ── Add Record ───────────────────────────────────────────
  function addRecord() {
    const date   = document.getElementById('inputDate').value;
    const weight = parseFloat(document.getElementById('inputWeight').value);
    const memo   = document.getElementById('inputMemo').value.trim();

    if (!date) return alert('날짜를 입력해주세요.');
    if (isNaN(weight) || weight <= 0) return alert('체중을 올바르게 입력해주세요.');

    // 중복 날짜 확인
    const existRes = db.exec(`SELECT date FROM records WHERE date = '${date}'`);
    if (existRes.length && existRes[0].values.length) {
      if (!confirm('같은 날짜 기록이 있습니다. 덮어쓸까요?')) return;
    }

    db.run(
      'INSERT OR REPLACE INTO records (date, weight, memo) VALUES (?, ?, ?)',
      [date, weight, memo]
    );
    saveDB();

    document.getElementById('inputWeight').value = '';
    document.getElementById('inputMemo').value   = '';
    render();
  }

  // ── Delete ───────────────────────────────────────────────
  function deleteRecord(date) {
    if (!confirm(`${date} 기록을 삭제할까요?`)) return;
    db.run('DELETE FROM records WHERE date = ?', [date]);
    saveDB();
    render();
  }

  function clearAll() {
    if (!confirm('모든 기록을 삭제할까요?')) return;
    db.run('DELETE FROM records');
    saveDB();
    render();
  }

  // ── Goal ─────────────────────────────────────────────────
  function saveGoal() {
    const start  = parseFloat(document.getElementById('goalStart').value);
    const target = parseFloat(document.getElementById('goalTarget').value);
    if (isNaN(start) || isNaN(target)) return alert('시작/목표 체중을 입력해주세요.');
    dbSet('goal', { start, target });
    updateGoalProgress();
  }

  function loadGoalUI() {
    const g = dbGet('goal');
    if (!g) return;
    document.getElementById('goalStart').value  = g.start;
    document.getElementById('goalTarget').value = g.target;
    updateGoalProgress();
  }

  function updateGoalProgress() {
    const g       = dbGet('goal');
    const records = getRecords();
    const section = document.getElementById('goalSection');
    if (!g) { section.style.display = 'none'; return; }

    section.style.display = 'block';
    document.getElementById('goalStartLbl').textContent  = `${g.start}kg`;
    document.getElementById('goalTargetLbl').textContent = `${g.target}kg`;

    if (records.length === 0) {
      document.getElementById('goalPct').textContent   = '0%';
      document.getElementById('goalFill').style.width  = '0%';
      document.getElementById('goalMsg').textContent   = '기록을 입력하면 진행률이 표시됩니다.';
      return;
    }

    const current = records[records.length - 1].weight;
    const total   = Math.abs(g.start - g.target);
    const done    = Math.abs(g.start - current);
    const pct     = total === 0 ? 100 : Math.min(100, Math.round(done / total * 100));
    const diff    = Math.abs((current - g.target).toFixed(1));
    const reached = (g.target >= g.start ? current >= g.target : current <= g.target);

    document.getElementById('goalPct').textContent  = `${pct}%`;
    document.getElementById('goalFill').style.width = `${pct}%`;
    document.getElementById('goalMsg').textContent  = reached
      ? '🎉 목표 달성!'
      : `목표까지 ${diff}kg 남았습니다.`;
  }

  // ── 감량 속도 ────────────────────────────────────────────
  function updatePace() {
    const records = getRecords();
    const el = document.getElementById('paceSection');
    if (records.length < 2) { el.innerHTML = ''; return; }

    const now    = new Date();
    const recent = records.filter(r => daysDiff(r.date, now) <= 28);
    const sample = recent.length >= 2 ? recent : records;
    const periodLabel = recent.length >= 2 ? '최근 4주' : '전체 기간';

    const first = sample[0];
    const last  = sample[sample.length - 1];
    const days  = (new Date(last.date) - new Date(first.date)) / 86400000;
    if (days === 0) { el.innerHTML = ''; return; }

    const weeklyRate = (last.weight - first.weight) / days * 7;
    const absRate    = Math.abs(weeklyRate);
    const isLosing   = weeklyRate < 0;
    const paceColor  = isLosing ? '#22c55e' : weeklyRate > 0 ? '#ef4444' : 'var(--sub)';
    const paceStr    = `${isLosing ? '▼' : weeklyRate > 0 ? '▲' : '→'} ${absRate.toFixed(2)}kg/주`;

    const g       = dbGet('goal');
    const current = last.weight;
    let goalHTML  = '';

    if (g && !isNaN(g.target)) {
      const remaining  = current - g.target;
      const needToLose = g.target < current;
      const onTrack    = (needToLose && isLosing) || (!needToLose && weeklyRate > 0);

      if (Math.abs(remaining) < 0.05) {
        goalHTML = `<div class="pace-row">
          <span class="pace-label">목표까지</span>
          <span class="pace-value" style="color:#22c55e">🎉 달성!</span>
        </div>`;
      } else if (onTrack && absRate > 0) {
        const weeks  = Math.abs(remaining / weeklyRate);
        const eta    = new Date(now.getTime() + weeks * 7 * 86400000);
        const etaStr = `${eta.getFullYear()}.${String(eta.getMonth()+1).padStart(2,'0')}.${String(eta.getDate()).padStart(2,'0')}`;
        goalHTML = `<div class="pace-row">
          <span class="pace-label">목표까지</span>
          <span class="pace-value" style="color:var(--primary)">약 ${Math.ceil(weeks)}주 (${etaStr} 예상)</span>
        </div>`;
      } else {
        goalHTML = `<div class="pace-row">
          <span class="pace-label">목표까지</span>
          <span class="pace-value" style="color:#ef4444">현재 페이스로 달성 어려움</span>
        </div>`;
      }
    }

    el.innerHTML = `<div class="pace-box">
      <div class="pace-row">
        <span class="pace-label">${periodLabel} 감량 속도</span>
        <span class="pace-value" style="color:${paceColor}">${paceStr}</span>
      </div>
      ${goalHTML}
    </div>`;
  }

  // ── BMI ──────────────────────────────────────────────────
  function loadHeightUI() {
    const h = dbGet('height');
    if (h) document.getElementById('bmiHeight').value = h;
  }

  function calcBMI() {
    const hVal = parseFloat(document.getElementById('bmiHeight').value);
    if (isNaN(hVal) || hVal < 50) return alert('키를 올바르게 입력해주세요.');
    dbSet('height', hVal);

    const records = getRecords();
    const el = document.getElementById('bmiResult');
    if (records.length === 0) { el.innerHTML = '체중 기록이 없습니다.'; return; }

    const w   = records[records.length - 1].weight;
    const h   = hVal / 100;
    const bmi = (w / (h * h)).toFixed(1);

    let cat = '', color = '';
    if      (bmi < 18.5) { cat = '저체중';  color = '#3b82f6'; }
    else if (bmi < 23)   { cat = '정상';    color = '#22c55e'; }
    else if (bmi < 25)   { cat = '과체중';  color = '#f59e0b'; }
    else if (bmi < 30)   { cat = '비만';    color = '#ef4444'; }
    else                  { cat = '고도비만'; color = '#7f1d1d'; }

    el.innerHTML = `BMI: <strong style="color:${color};font-size:1.2rem">${bmi}</strong> <span style="color:${color}">(${cat})</span><br><span style="font-size:0.8rem">정상 범위: 18.5 ~ 22.9</span>`;
  }

  // ── Stats ─────────────────────────────────────────────────
  function calcStreaks(records) {
    if (records.length === 0) return { best: 0, current: 0 };

    let best = 1, cur = 1;
    for (let i = 1; i < records.length; i++) {
      const diff = (new Date(records[i].date) - new Date(records[i-1].date)) / 86400000;
      cur = diff === 1 ? cur + 1 : 1;
      if (cur > best) best = cur;
    }

    const todayStr     = new Date().toISOString().slice(0, 10);
    const yesterdayStr = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    const lastDate     = records[records.length - 1].date;

    let streak = 0;
    if (lastDate === todayStr || lastDate === yesterdayStr) {
      streak = 1;
      for (let i = records.length - 2; i >= 0; i--) {
        const diff = (new Date(records[i+1].date) - new Date(records[i].date)) / 86400000;
        if (diff === 1) streak++;
        else break;
      }
    }

    return { best, current: streak };
  }

  function setVal(id, text, color) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.style.color = color;
  }

  function updateStats(records) {
    const ids = ['statCurrent','statWeekAvg','statMonthAvg','statMin','statMax','statTotal','statStreak','statBestStreak','statCount'];
    if (records.length === 0) {
      ids.forEach(id => {
        document.getElementById(id).textContent = '—';
        document.getElementById(id).style.color = '';
      });
      return;
    }

    const C = {
      primary: '#4f8ef7', green: '#22c55e', red: '#ef4444',
      amber: '#f59e0b', gold: '#eab308', sub: 'var(--sub)',
    };

    const weights = records.map(r => r.weight);
    const now     = new Date();
    const last7   = records.filter(r => daysDiff(r.date, now) <= 7).map(r => r.weight);
    const last30  = records.filter(r => daysDiff(r.date, now) <= 30).map(r => r.weight);
    const avg     = arr => arr.length ? (arr.reduce((a,b) => a+b,0) / arr.length).toFixed(1) : null;

    const current = weights[weights.length - 1];
    const diff    = parseFloat((current - weights[0]).toFixed(1));
    const streaks = calcStreaks(records);

    setVal('statCurrent',  `${current}kg`,                                   C.primary);
    setVal('statWeekAvg',  last7.length  ? `${avg(last7)}kg`  : '—',         C.primary);
    setVal('statMonthAvg', last30.length ? `${avg(last30)}kg` : '—',         C.primary);
    setVal('statMin',   `${Math.min(...weights)}kg`,                          C.green);
    setVal('statMax',   `${Math.max(...weights)}kg`,                          C.red);
    setVal('statTotal', `${diff > 0 ? '+' : ''}${diff}kg`,
           diff < 0 ? C.green : diff > 0 ? C.red : C.sub);

    const streakColor = streaks.current === 0 ? C.sub
                      : streaks.current < 7   ? C.amber
                      : streaks.current < 30  ? C.primary : C.green;
    setVal('statStreak',     `${streaks.current}일`, streakColor);
    setVal('statBestStreak', `${streaks.best}일`,    C.gold);
    setVal('statCount',      `${records.length}일`,  C.primary);
  }

  function daysDiff(dateStr, now) {
    return Math.floor((now - new Date(dateStr)) / 86400000);
  }

  // ── Chart ─────────────────────────────────────────────────
  function setRange(days, btn) {
    chartRange = days;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateChart(getRecords());
  }

  function updateChart(records) {
    const isDark    = document.body.classList.contains('dark');
    const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.05)';
    const tickColor = isDark ? '#94a3b8' : '#64748b';

    const now      = new Date();
    const filtered = chartRange === 0
      ? records
      : records.filter(r => daysDiff(r.date, now) <= chartRange);

    const labels = filtered.map(r => r.date.slice(5));
    const data   = filtered.map(r => r.weight);
    const goal   = dbGet('goal');

    if (weightChart) weightChart.destroy();

    const datasets = [{
      label: '체중 (kg)',
      data,
      borderColor: '#4f8ef7',
      backgroundColor: 'rgba(79,142,247,0.08)',
      borderWidth: 2.5,
      pointRadius: data.length > 60 ? 0 : 4,
      pointHoverRadius: 6,
      tension: 0.35,
      fill: true,
    }];

    if (goal && data.length) {
      datasets.push({
        label: '목표',
        data: data.map(() => goal.target),
        borderColor: '#22c55e',
        borderDash: [6, 4],
        borderWidth: 1.5,
        pointRadius: 0,
        fill: false,
      });
    }

    weightChart = new Chart(document.getElementById('weightChart').getContext('2d'), {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: { boxWidth: 14, font: { size: 12 }, color: tickColor }
          }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { maxTicksLimit: 8, font: { size: 11 }, color: tickColor }
          },
          y: {
            grid: { color: gridColor },
            ticks: { callback: v => `${v}kg`, font: { size: 11 }, color: tickColor },
            suggestedMin: data.length ? Math.min(...data) - 2 : 50,
            suggestedMax: data.length ? Math.max(...data) + 2 : 90,
          }
        }
      }
    });
  }

  // ── 요일별 평균 ──────────────────────────────────────────
  function updateWeekdayStats(records) {
    const el = document.getElementById('weekdayStats');
    if (records.length === 0) {
      el.innerHTML = '<p class="empty" style="width:100%">기록이 없습니다.</p>';
      return;
    }
    const labels  = ['일', '월', '화', '수', '목', '금', '토'];
    const buckets = Array.from({length: 7}, () => []);
    for (const r of records) buckets[new Date(r.date).getDay()].push(r.weight);

    const avgs   = buckets.map(b => b.length ? b.reduce((a,c) => a+c, 0) / b.length : null);
    const valid  = avgs.filter(v => v !== null);
    const minAvg = valid.length ? Math.min(...valid) : 0;
    const range  = valid.length ? (Math.max(...valid) - minAvg) || 1 : 1;
    const todayDow = new Date().getDay();

    el.innerHTML = labels.map((d, i) => {
      const avg = avgs[i];
      const pct = avg !== null ? Math.round((avg - minAvg) / range * 75 + 15) : 0;
      return `<div class="dow-box${i === todayDow ? ' today' : ''}">
        <div class="dow-label">${d}</div>
        <div class="dow-bar-wrap"><div class="dow-bar" style="height:${pct}%"></div></div>
        <div class="dow-val">${avg !== null ? avg.toFixed(1) : '—'}</div>
        <div class="dow-count">${buckets[i].length}회</div>
      </div>`;
    }).join('');
  }

  // ── Table (아코디언) ──────────────────────────────────────
  function toggleMemo(date) {
    const el = document.getElementById(`memo-${date}`);
    if (el) el.style.display = el.style.display === 'none' ? 'table-row' : 'none';
  }

  function toggleAcc(id) {
    const body  = document.getElementById(id);
    const arrow = document.getElementById('arr-' + id);
    if (!body) return;
    const opening = body.style.display === 'none';
    body.style.display = opening ? '' : 'none';
    if (arrow) arrow.textContent = opening ? '▲' : '▼';
  }

  function updateTable(records) {
    const wrap = document.getElementById('tableWrap');
    if (records.length === 0) {
      wrap.innerHTML = '<p class="empty">기록이 없습니다.</p>';
      return;
    }

    const reversed = [...records].reverse();
    const years    = [];
    const byYear   = {};

    for (const r of reversed) {
      const y = r.date.slice(0, 4);
      const m = r.date.slice(0, 7);
      if (!byYear[y]) { byYear[y] = { months: [], byMonth: {} }; years.push(y); }
      if (!byYear[y].byMonth[m]) { byYear[y].byMonth[m] = []; byYear[y].months.push(m); }
      byYear[y].byMonth[m].push(r);
    }

    let html = '<div class="accordion">';

    years.forEach((year, yi) => {
      const ydata      = byYear[year];
      const totalCount = ydata.months.reduce((s, m) => s + ydata.byMonth[m].length, 0);
      const isLatestY  = yi === 0;

      html += `
        <div class="acc-year-hd" onclick="toggleAcc('y-${year}')">
          <span>${year}년</span>
          <span class="acc-meta">${totalCount}건</span>
          <span class="acc-arrow" id="arr-y-${year}">${isLatestY ? '▲' : '▼'}</span>
        </div>
        <div id="y-${year}" style="${isLatestY ? '' : 'display:none'}">`;

      ydata.months.forEach((month, mi) => {
        const mRecs     = ydata.byMonth[month];
        const isLatestM = isLatestY && mi === 0;
        const monthLabel = parseInt(month.slice(5)) + '월';
        const avg = (mRecs.reduce((s, r) => s + r.weight, 0) / mRecs.length).toFixed(1);

        html += `
          <div class="acc-month-hd" onclick="toggleAcc('m-${month}')">
            <span>${monthLabel}</span>
            <span class="acc-meta">${mRecs.length}건 · 평균 ${avg}kg</span>
            <span class="acc-arrow" id="arr-m-${month}">${isLatestM ? '▲' : '▼'}</span>
          </div>
          <div id="m-${month}" style="${isLatestM ? '' : 'display:none'}">
            <table>
              <thead><tr><th>일</th><th>체중 (kg)</th><th>변화</th><th></th></tr></thead>
              <tbody>`;

        for (const r of mRecs) {
          const idx  = reversed.findIndex(x => x.date === r.date);
          const prev = reversed[idx + 1];
          let changeHTML = '<span class="change-eq">—</span>';
          if (prev) {
            const d = (r.weight - prev.weight).toFixed(1);
            if      (d > 0) changeHTML = `<span class="change-up">▲ ${d}</span>`;
            else if (d < 0) changeHTML = `<span class="change-down">▼ ${Math.abs(d)}</span>`;
            else             changeHTML = '<span class="change-eq">→</span>';
          }
          const dd      = parseInt(r.date.slice(8)) + '일';
          const hasMemo = r.memo && r.memo.trim();

          html += `<tr class="data-row${hasMemo ? ' has-memo' : ''}" onclick="${hasMemo ? `toggleMemo('${r.date}')` : ''}">
            <td>${dd}</td>
            <td><strong>${r.weight}</strong></td>
            <td>${changeHTML}</td>
            <td><button class="del-btn" onclick="event.stopPropagation();deleteRecord('${r.date}')" title="삭제">✕</button></td>
          </tr>`;

          if (hasMemo) {
            html += `<tr class="memo-row" id="memo-${r.date}" style="display:none">
              <td colspan="4">💬 ${r.memo}</td>
            </tr>`;
          }
        }

        html += `</tbody></table></div>`;
      });

      html += `</div>`;
    });

    html += '</div>';
    wrap.innerHTML = html;
  }

  // ── 백업 카드 펼침/접힘 ───────────────────────────────────
  function toggleBackupCard() {
    const body  = document.getElementById('backupBody');
    const arrow = document.getElementById('backupArrow');
    const isOpen = body.style.display !== 'none';
    body.style.display  = isOpen ? 'none' : '';
    arrow.textContent   = isOpen ? '▼' : '▲';
  }

  // ── 백업 / 복원 ──────────────────────────────────────────
  function exportJSON() {
    const backup = {
      version: 1,
      exportedAt: new Date().toISOString(),
      records: getRecords(),
      goal:    dbGet('goal'),
      height:  dbGet('height'),
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `체중관리_백업_${today()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    markBackupDone(); // 백업 날짜 기록 + 완료 배너
  }

  function exportSQLite() {
    const data = db.export();
    const blob = new Blob([data], { type: 'application/octet-stream' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `체중관리_${today()}.db`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importBackup(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data.records)) throw new Error('잘못된 형식');

        const existing = getRecords();
        if (existing.length > 0) {
          if (!confirm(`기존 기록 ${existing.length}개가 있습니다.\n백업 파일과 병합할까요?\n(취소 시 기존 데이터를 덮어씁니다)`)) {
            db.run('DELETE FROM records');
            data.records.forEach(r => {
              db.run('INSERT INTO records (date, weight, memo) VALUES (?, ?, ?)',
                [r.date, r.weight, r.memo || '']);
            });
          } else {
            data.records.forEach(r => {
              db.run('INSERT OR REPLACE INTO records (date, weight, memo) VALUES (?, ?, ?)',
                [r.date, r.weight, r.memo || '']);
            });
          }
        } else {
          data.records.forEach(r => {
            db.run('INSERT OR REPLACE INTO records (date, weight, memo) VALUES (?, ?, ?)',
              [r.date, r.weight, r.memo || '']);
          });
        }

        if (data.goal)   db.run('INSERT OR REPLACE INTO settings (key, value) VALUES (?, ?)', ['goal',   JSON.stringify(data.goal)]);
        if (data.height) db.run('INSERT OR REPLACE INTO settings (key, value) VALUES (?, ?)', ['height', JSON.stringify(data.height)]);
        saveDB();

        const count = getRecords().length;
        const msg   = document.getElementById('restoreMsg');
        msg.style.color = '#22c55e';
        msg.textContent = `복원 완료 — 기록 ${count}개 불러왔습니다.`;
        render();
      } catch (err) {
        const msg = document.getElementById('restoreMsg');
        msg.style.color = '#ef4444';
        msg.textContent = '파일 형식이 올바르지 않습니다.';
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  }

  // ── Render ────────────────────────────────────────────────
  function render() {
    const records = getRecords();
    updateStats(records);
    updateChart(records);
    updateWeekdayStats(records);
    updateTable(records);
    updateGoalProgress();
    updatePace();
    const h = dbGet('height');
    if (h) calcBMI();
  }
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js');
    });
  }
</script>
